schema_version = "0.1"

[resolution]
width = 800
height = 600

[camera]
x = 0.0
y = 0.0
zoom = 1.0
clear_color = { r = 0.1, g = 0.1, b = 0.15 }

[interaction]
[[interaction.actions]]
action = "click_target"
mouse = "Left"

[[entities]]
id = "instruction_text"
[entities.transform]
x = 0.0
y = 200.0
z = 0.5
[entities.text]
value = "Drag the shapes around!"
size = 32.0
color = { r = 0.8, g = 0.8, b = 0.8 }
anchor = "center"
align = "center"

[[entities]]
id = "draggable_rect"
[entities.transform]
x = -150.0
y = 0.0
z = 1.0
[entities.shape]
kind = "rect"
width = 100.0
height = 100.0
color = { r = 0.9, g = 0.3, b = 0.6 }
[entities.interaction]
draggable = true
selectable = true
on_click = "click_target"

[[entities]]
id = "draggable_circle"
[entities.transform]
x = 150.0
y = 0.0
z = 1.0
[entities.shape]
kind = "circle"
radius = 60.0
color = { r = 0.3, g = 0.8, b = 0.6 }
[entities.interaction]
draggable = true
selectable = true
on_click = "click_target"
