[scene]
schema_version = "0.1"

[scene.resolution]
width = 800
height = 600

[scene.camera]
x = 0.0
y = 0.0
zoom = 1.0
clear_color = { r = 0.1, g = 0.1, b = 0.15 }

[scene.interaction]
[[scene.interaction.actions]]
action = "click_target"
keys = []
mouse = "Left"

[[scene.entities]]
id = "instruction_text"
[scene.entities.transform]
x = 0.0
y = 200.0
z = 0.5
[scene.entities.text]
value = "Drag the shapes around!"
size = 32.0
color = { r = 0.8, g = 0.8, b = 0.8 }
anchor = "center"
align = "center"

[[scene.entities]]
id = "draggable_rect"
[scene.entities.transform]
x = -150.0
y = 0.0
z = 1.0
[scene.entities.shape]
kind = "rect"
width = 100.0
height = 100.0
color = { r = 0.9, g = 0.3, b = 0.6 }
[scene.entities.interaction]
draggable = true
selectable = true
on_click = "click_target"

[[scene.entities]]
id = "draggable_circle"
[scene.entities.transform]
x = 150.0
y = 0.0
z = 1.0
[scene.entities.shape]
kind = "circle"
radius = 60.0
color = { r = 0.3, g = 0.8, b = 0.6 }
[scene.entities.interaction]
draggable = true
selectable = true
on_click = "click_target"

