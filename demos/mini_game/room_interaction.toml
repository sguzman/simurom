[scene]
schema_version = "0.1"

[scene.resolution]
width = 1280
height = 720

[scene.camera]
x = 0.0
y = 0.0
zoom = 1.0
clear_color = { r = 0.08, g = 0.08, b = 0.12 }

[scene.interaction]
[[scene.interaction.actions]]
action = "move_up"
keys = ["e"]

[[scene.interaction.actions]]
action = "move_down"
keys = ["d"]

[[scene.interaction.actions]]
action = "move_left"
keys = ["s"]

[[scene.interaction.actions]]
action = "move_right"
keys = ["f"]

[[scene.interaction.actions]]
action = "interact"
keys = ["space"]

[[scene.entities]]
id = "room_floor"
[scene.entities.transform]
x = 0.0
y = 0.0
z = 0.1
[scene.entities.sprite]
image = "mini_game/images/floor.png"
width = 1000.0
height = 600.0

[[scene.entities]]
id = "room_wall_top"
[scene.entities.transform]
x = 0.0
y = 300.0
z = 0.5
[scene.entities.shape]
kind = "rect"
width = 1000.0
height = 20.0
color = { r = 0.2, g = 0.2, b = 0.3 }

[[scene.entities]]
id = "room_wall_bottom"
[scene.entities.transform]
x = 0.0
y = -300.0
z = 0.5
[scene.entities.shape]
kind = "rect"
width = 1000.0
height = 20.0
color = { r = 0.2, g = 0.2, b = 0.3 }

[[scene.entities]]
id = "room_wall_left"
[scene.entities.transform]
x = -500.0
y = 0.0
z = 0.5
[scene.entities.shape]
kind = "rect"
width = 20.0
height = 600.0
color = { r = 0.2, g = 0.2, b = 0.3 }

[[scene.entities]]
id = "room_wall_right"
[scene.entities.transform]
x = 500.0
y = 0.0
z = 0.5
[scene.entities.shape]
kind = "rect"
width = 20.0
height = 600.0
color = { r = 0.2, g = 0.2, b = 0.3 }

# Object 1: Terminal
[[scene.entities]]
id = "terminal"
[scene.entities.transform]
x = -250.0
y = 150.0
z = 1.0
[scene.entities.shape]
kind = "circle"
radius = 35.0
color = { r = 0.1, g = 0.6, b = 0.9 }
[scene.entities.interaction]
on_click = "text:Terminal: Unauthorized bio-signature detected in Sector 3."

[[scene.entities]]
id = "terminal_label"
[scene.entities.transform]
x = -250.0
y = 90.0
z = 1.5
[scene.entities.text]
value = "Mainframe Terminal (Space)"
size = 16.0
color = { r = 0.6, g = 0.8, b = 1.0 }
anchor = "center"
align = "center"

# Object 2: Energy Cell
[[scene.entities]]
id = "energy_cell"
[scene.entities.transform]
x = 250.0
y = 150.0
z = 1.0
[scene.entities.shape]
kind = "circle"
radius = 35.0
color = { r = 0.8, g = 0.6, b = 0.1 }
[scene.entities.interaction]
on_click = "text:Energy Cell: 100% capacity. It hums softly."

[[scene.entities]]
id = "energy_label"
[scene.entities.transform]
x = 250.0
y = 90.0
z = 1.5
[scene.entities.text]
value = "Relic Battery (Space)"
size = 16.0
color = { r = 0.9, g = 0.8, b = 0.6 }
anchor = "center"
align = "center"

# Door to multi-room puzzle
[[scene.entities]]
id = "door_to_puzzle"
[scene.entities.transform]
x = 0.0
y = 260.0
z = 1.0
[scene.entities.sprite]
image = "mini_game/images/door.png"
width = 120.0
height = 80.0
[scene.entities.interaction]
on_click = "transition:demos/mini_game/game_room.toml"

[[scene.entities]]
id = "door_label"
[scene.entities.transform]
x = 0.0
y = 190.0
z = 1.5
[scene.entities.text]
value = "Enter Sector 3 (Transition)"
size = 18.0
color = { r = 0.0, g = 0.8, b = 1.0 }
anchor = "center"
align = "center"

[[scene.entities]]
id = "player_character"
[scene.entities.transform]
x = 0.0
y = -150.0
z = 2.0
[scene.entities.sprite]
image = "mini_game/images/player.png"
width = 80.0
height = 80.0
[scene.entities.agent]
kind = "player"

[[scene.entities]]
id = "instructions_banner"
[scene.entities.transform]
x = 0.0
y = -330.0
z = 1.5
[scene.entities.text]
value = "ROOM 2: INTERACTION DEMO — Approach objects and press Space to examine them."
size = 20.0
color = { r = 0.8, g = 0.8, b = 0.9 }
anchor = "center"
align = "center"
