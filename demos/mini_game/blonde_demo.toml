[scene]
schema_version = "0.1"

[scene.resolution]
width = 1280
height = 720

[scene.camera]
x = 0.0
y = 0.0
zoom = 1.0
clear_color = { r = 0.05, g = 0.05, b = 0.08 }

[scene.interaction]
[[scene.interaction.actions]]
action = "move_up"
keys = ["e"]

[[scene.interaction.actions]]
action = "move_down"
keys = ["d"]

[[scene.interaction.actions]]
action = "move_left"
keys = ["s"]

[[scene.interaction.actions]]
action = "move_right"
keys = ["f"]

[[scene.interaction.actions]]
action = "interact"
keys = ["space"]

[[scene.entities]]
id = "room_floor"
[scene.entities.transform]
x = 0.0
y = 0.0
z = 0.1
[scene.entities.sprite]
image = "mini_game/images/floor.png"
width = 1000.0
height = 600.0

# Blonde Character with Advanced Dynamic Blinking
[[scene.entities]]
id = "blonde_character"
character_file = "mini_game/characters/blonde.toml"
[scene.entities.transform]
x = 0.0
y = 80.0
z = 2.0

# Player Character
[[scene.entities]]
id = "player_character"
[scene.entities.transform]
x = 0.0
y = -150.0
z = 3.0
[scene.entities.sprite]
image = "mini_game/images/player.png"
width = 80.0
height = 80.0
[scene.entities.agent]
kind = "player"

[[scene.entities]]
id = "instructions_banner"
[scene.entities.transform]
x = 0.0
y = -260.0
z = 1.5
[scene.entities.text]
value = "ADVANCED BLONDE CHARACTER BLINKING DEMO\nObserve the looping, highly customizable multi-frame random blinking behavior.\nThe blonde eyes transition smoothly from fully open -> partially closed -> closed -> fully open!\nBlink events occur every 5 seconds (+/- 2 seconds random delta)."
size = 18.0
color = { r = 0.9, g = 0.85, b = 0.7 }
anchor = "center"
align = "center"
