[scene]
schema_version = "0.1"

[scene.resolution]
width = 1280
height = 720

[scene.camera]
x = 0.0
y = 0.0
zoom = 1.0
clear_color = { r = 0.09, g = 0.06, b = 0.08 }

[scene.interaction]
[[scene.interaction.actions]]
action = "move_up"
keys = ["e"]

[[scene.interaction.actions]]
action = "move_down"
keys = ["d"]

[[scene.interaction.actions]]
action = "move_left"
keys = ["s"]

[[scene.interaction.actions]]
action = "move_right"
keys = ["f"]

[[scene.interaction.actions]]
action = "interact"
keys = ["space"]

[[scene.entities]]
id = "room_floor"
[scene.entities.transform]
x = 0.0
y = 0.0
z = 0.1
[scene.entities.sprite]
image = "mini_game/images/floor.png"
width = 1000.0
height = 600.0

[[scene.entities]]
id = "room_wall_top"
[scene.entities.transform]
x = 0.0
y = 300.0
z = 0.5
[scene.entities.shape]
kind = "rect"
width = 1000.0
height = 20.0
color = { r = 0.3, g = 0.2, b = 0.2 }

[[scene.entities]]
id = "room_wall_bottom"
[scene.entities.transform]
x = 0.0
y = -300.0
z = 0.5
[scene.entities.shape]
kind = "rect"
width = 1000.0
height = 20.0
color = { r = 0.3, g = 0.2, b = 0.2 }

[[scene.entities]]
id = "room_wall_left"
[scene.entities.transform]
x = -500.0
y = 0.0
z = 0.5
[scene.entities.shape]
kind = "rect"
width = 20.0
height = 600.0
color = { r = 0.3, g = 0.2, b = 0.2 }

[[scene.entities]]
id = "room_wall_right"
[scene.entities.transform]
x = 500.0
y = 0.0
z = 0.5
[scene.entities.shape]
kind = "rect"
width = 20.0
height = 600.0
color = { r = 0.3, g = 0.2, b = 0.2 }

# Door 1: To Backyard
[[scene.entities]]
id = "door_to_backyard"
[scene.entities.transform]
x = -250.0
y = 240.0
z = 1.0
[scene.entities.sprite]
image = "mini_game/images/door.png"
width = 100.0
height = 70.0
[scene.entities.interaction]
on_click = "transition:demos/mini_game/game_backyard.toml"

[[scene.entities]]
id = "backyard_door_label"
[scene.entities.transform]
x = -250.0
y = 180.0
z = 1.5
[scene.entities.text]
value = "To Backyard (Space)"
size = 16.0
color = { r = 0.2, g = 0.8, b = 1.0 }
anchor = "center"
align = "center"

# Door 2: To Control Room (Unlocked from inside!)
[[scene.entities]]
id = "door_to_control"
[scene.entities.transform]
x = 250.0
y = 240.0
z = 1.0
[scene.entities.sprite]
image = "mini_game/images/door.png"
width = 100.0
height = 70.0
[scene.entities.interaction]
on_click = "transition:demos/mini_game/game_room.toml"

[[scene.entities]]
id = "control_door_label"
[scene.entities.transform]
x = 250.0
y = 180.0
z = 1.5
[scene.entities.text]
value = "To Control Room (Unlock!)"
size = 16.0
color = { r = 0.2, g = 0.9, b = 0.5 }
anchor = "center"
align = "center"

# Object: Master Core (Victory Terminal)
[[scene.entities]]
id = "master_core"
[scene.entities.transform]
x = 0.0
y = 100.0
z = 1.0
[scene.entities.shape]
kind = "circle"
radius = 40.0
color = { r = 0.9, g = 0.2, b = 0.8 }
[scene.entities.interaction]
on_click = "text:VICTORY! Sector 3 Mainframe lock bypassed! You won!"

[[scene.entities]]
id = "victory_label"
[scene.entities.transform]
x = 0.0
y = 30.0
z = 1.5
[scene.entities.text]
value = "MAINTAIN CORE (Space)"
size = 18.0
color = { r = 1.0, g = 0.5, b = 1.0 }
anchor = "center"
align = "center"

[[scene.entities]]
id = "player_character"
[scene.entities.transform]
x = -200.0
y = -100.0
z = 2.0
[scene.entities.sprite]
image = "mini_game/images/player.png"
width = 80.0
height = 80.0
[scene.entities.agent]
kind = "player"

[[scene.entities]]
id = "instructions_banner"
[scene.entities.transform]
x = 0.0
y = -330.0
z = 1.5
[scene.entities.text]
value = "SECTOR 3: THE LIVING ROOM — Bypass the security lock at the Master Core!"
size = 20.0
color = { r = 0.9, g = 0.8, b = 0.9 }
anchor = "center"
align = "center"
