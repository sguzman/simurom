[scene]
schema_version = "0.1"

[scene.resolution]
width = 1280
height = 720

[scene.camera]
x = 0.0
y = 0.0
zoom = 1.0
clear_color = { r = 0.05, g = 0.05, b = 0.08 }

[[scene.entities]]
id = "title_card"
[scene.entities.transform]
x = 0.0
y = 120.0
z = 1.0
[scene.entities.sprite]
image = "mini_game/images/title.png"
width = 600.0
height = 300.0

[[scene.entities]]
id = "play_btn"
[scene.entities.transform]
x = -160.0
y = -160.0
z = 1.0
[scene.entities.shape]
kind = "circle"
radius = 45.0
color = { r = 0.1, g = 0.7, b = 0.5 }
[scene.entities.interaction]
selectable = true
on_click = "transition:demos/mini_game/room_movement.toml"

[[scene.entities]]
id = "play_label"
[scene.entities.transform]
x = -160.0
y = -160.0
z = 2.0
[scene.entities.text]
value = "PLAY"
size = 20.0
color = { r = 1.0, g = 1.0, b = 1.0 }
anchor = "center"
align = "center"

[[scene.entities]]
id = "exit_btn"
[scene.entities.transform]
x = 160.0
y = -160.0
z = 1.0
[scene.entities.shape]
kind = "circle"
radius = 45.0
color = { r = 0.8, g = 0.2, b = 0.3 }
[scene.entities.interaction]
selectable = true
on_click = "text:Thanks for playing Simurom!"

[[scene.entities]]
id = "exit_label"
[scene.entities.transform]
x = 160.0
y = -160.0
z = 2.0
[scene.entities.text]
value = "EXIT"
size = 20.0
color = { r = 1.0, g = 1.0, b = 1.0 }
anchor = "center"
align = "center"

[[scene.entities]]
id = "instructions"
[scene.entities.transform]
x = 0.0
y = -250.0
z = 1.0
[scene.entities.text]
value = "Left Click on PLAY to start the game! (Movement: ESDF | Proximity Interact: Space)"
size = 18.0
color = { r = 0.6, g = 0.6, b = 0.7 }
anchor = "center"
align = "center"
