[scene]
schema_version = "0.1"

[scene.camera]
x = 0.0
y = 0.0
zoom = 1.0
scaling_mode = "window_size"

[scene.background.clear_color]
r = 0.05
g = 0.06
b = 0.08
a = 1.0

[scene.defaults]
text_font_size = 24.0

[scene.defaults.text_color]
r = 1.0
g = 1.0
b = 1.0
a = 1.0

[scene.playback]
duration_secs = 6.0
loop_mode = "loop"
allow_user_input = true
allow_scrub = true
allow_rewind = true
enable_introspection = false

[[scene.effects]]
id = "grayscale"
wgsl = "effects/grayscale.wgsl"

[scene.effects.params]
intensity = 0.85

[[scene.entities]]
id = "title"
tags = ["ui", "text"]

[scene.entities.text]
value = "simurom"
size = 48.0
align = "center"
anchor = "center"

[scene.entities.transform]
x = 0.0
y = 120.0
z = 0.0

[[scene.entities]]
id = "hint"

[scene.entities.text]
value = "Scene is TOML-driven."
size = 18.0

[scene.entities.transform]
x = 0.0
y = 60.0
z = 0.0
